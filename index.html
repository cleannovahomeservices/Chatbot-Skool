<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soporte Skool 24/7</title>

  <!-- Estilos del chat n8n -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    :root{
      /* Paleta Amazon + Skool */
      --amazon-black: #131921;
      --amazon-orange: #ff9900;
      --skool-blue: #2d6cdf;

      --bg: #0b1220;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.75);
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(45,108,223,0.35), transparent 60%),
        radial-gradient(900px 600px at 90% 80%, rgba(255,153,0,0.25), transparent 55%),
        linear-gradient(180deg, var(--bg), #05070f);
      color: var(--text);
      padding: 24px;
    }

    .wrap{
      width: 100%;
      max-width: 780px;
      text-align: center;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 38px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .badge{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.25);
      margin-bottom: 16px;
    }

    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #25d366; /* verde online */
      box-shadow: 0 0 12px rgba(37,211,102,0.6);
    }

    h1{
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 0.2px;
      line-height: 1.15;
    }

    .highlight{
      background: linear-gradient(90deg, var(--amazon-orange), var(--skool-blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p{
      margin: 14px 0 0;
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .mini{
      margin-top: 22px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
    }

    /* Opcional: hace que el botón del chat quede más "premium" */
    .n8n-chat-launcher{
      border-radius: 16px !important;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">
        <span class="dot"></span>
        Soporte activo
      </div>

      <h1>
        <span class="highlight">Soporte Skool</span> <br />
        24/7 horas
      </h1>

      <p>
        Atención inmediata para dudas, problemas y soporte general.
        <br />
        Pulsa el chat para empezar 👇
      </p>

      <div class="mini">
        Estilo Amazon + Skool • Diseño limpio • Chat integrado
      </div>
    </div>
  </div>

  <!-- Script del chat n8n -->
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://n8n-n8n.3asuar.easypanel.host/webhook/f2a876f5-b691-4fcf-aaa6-4c42ca0739f2/chat'
    });
  </script>
</body>
</html>
